version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_DB=djangodb
      - POSTGRES_USER=djangouser
      - POSTGRES_PASSWORD=supersecurepassword
    networks:
      - django_net

  web:
    build: .
    restart: unless-stopped
    volumes:
      - static_volume:/app/Backend/staticfiles
      - media_volume:/app/Backend/mediafiles
    environment:
      - DEBUG=False
      - DATABASE_URL=postgres://djangouser:supersecurepassword@db:5432/djangodb
    depends_on:
      - db
    networks:
      - django_net

  nginx:
    image: nginx:alpine
    container_name: uiux_nginx
    restart: always
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/Backend/staticfiles
      - media_volume:/app/Backend/mediafiles
      - ./Frontend:/app/Frontend:ro
    depends_on:
      - web
    networks:
      - django_net
      - global_gateway_net

volumes:
  postgres_data:
  static_volume:
  media_volume:

networks:
  django_net:
    driver: bridge
  global_gateway_net:
    external: true
